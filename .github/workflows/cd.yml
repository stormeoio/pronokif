# Pronokif CD — trigger StormDeploy on push to main.
#
# Required GitHub secrets:
#   STORMDEPLOY_WEBHOOK_SECRET — HMAC secret configured on the StormDeploy app
#   STORMEO_DEPLOY_TOKEN       — GitHub PAT with push access to stormeoio/pronokif
#
# Optional GitHub variable:
#   STORMDEPLOY_WEBHOOK_URL — defaults to the production Pronokif StormDeploy webhook

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-check:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for backend CI gate
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Backend (lint + test)"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Wait for frontend CI gate
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Frontend (lint + typecheck + test + build)"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Wait for E2E gate
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "E2E tests (Playwright)"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Wait for Docker build gate
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Docker build check"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  deploy:
    name: Trigger StormDeploy
    runs-on: ubuntu-latest
    needs: [ci-check]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync deploy mirror (stormeoio/pronokif)
        env:
          STORMEO_DEPLOY_TOKEN: ${{ secrets.STORMEO_DEPLOY_TOKEN }}
        run: |
          if [ -z "$STORMEO_DEPLOY_TOKEN" ]; then
            echo "::warning::STORMEO_DEPLOY_TOKEN not set — skipping mirror sync"
          else
            git remote add stormeo "https://x-access-token:${STORMEO_DEPLOY_TOKEN}@github.com/stormeoio/pronokif.git"
            git push stormeo main --force 2>&1 || echo "::warning::Mirror sync failed (non-blocking)"
          fi

      - name: Trigger signed StormDeploy webhook
        env:
          STORMDEPLOY_WEBHOOK_URL: ${{ vars.STORMDEPLOY_WEBHOOK_URL || 'https://beta.stormeo.io/api/storm-deploy/webhook/pronokif' }}
          STORMDEPLOY_WEBHOOK_SECRET: ${{ secrets.STORMDEPLOY_WEBHOOK_SECRET }}
        run: |
          if [ -z "$STORMDEPLOY_WEBHOOK_SECRET" ]; then
            echo "::error::Missing STORMDEPLOY_WEBHOOK_SECRET. Configure the GitHub secret with the value stored on the StormDeploy app."
            exit 1
          fi

          commit_message="$(git log -1 --pretty=%s)"
          payload="$(jq -nc \
            --arg ref "$GITHUB_REF" \
            --arg after "$GITHUB_SHA" \
            --arg message "$commit_message" \
            '{ref: $ref, after: $after, head_commit: {message: $message}}')"

          signature="$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$STORMDEPLOY_WEBHOOK_SECRET" | awk '{print $2}')"

          curl --fail-with-body --show-error --silent \
            -X POST "$STORMDEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$signature" \
            --data "$payload"

      - name: Canary — wait for new bundle
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          # Poll until the deployed frontend bundle changes (new Vite hash in HTML).
          # This confirms the Docker image was rebuilt and nginx is serving fresh code.
          # curl is bounded (--connect-timeout/--max-time) and we fast-fail when the
          # origin is unreachable, so a down VPS fails the deploy in ~30s instead of
          # hanging this step for the whole job timeout (an unbounded curl on an
          # unreachable origin once wedged this step for ~50 min).
          echo "Waiting for new bundle to go live (sha=$EXPECTED_SHA)..."
          OLD_BUNDLE=$(curl -sf --connect-timeout 10 --max-time 20 https://pronokif.eu/ | grep -oiE '/assets/index-[a-zA-Z0-9_-]+\.js' | head -1 || echo "unknown")
          echo "Current bundle: $OLD_BUNDLE"
          unreachable=0
          for attempt in $(seq 1 30); do
            if HTML=$(curl -sf --connect-timeout 10 --max-time 20 https://pronokif.eu/); then
              unreachable=0
              NEW_BUNDLE=$(printf '%s' "$HTML" | grep -oiE '/assets/index-[a-zA-Z0-9_-]+\.js' | head -1 || echo "")
              if [ -n "$NEW_BUNDLE" ] && [ "$NEW_BUNDLE" != "$OLD_BUNDLE" ]; then
                echo "::notice::Bundle updated: $OLD_BUNDLE → $NEW_BUNDLE"
                break
              fi
              echo "Attempt $attempt/30: bundle still $NEW_BUNDLE, sleeping 10s..."
            else
              unreachable=$((unreachable + 1))
              echo "Attempt $attempt/30: origin unreachable ($unreachable consecutive)"
              if [ "$unreachable" -ge 3 ]; then
                echo "::error::Origin https://pronokif.eu unreachable for $unreachable consecutive checks — deploy did not go live (origin/VPS down)."
                exit 1
              fi
            fi
            sleep 10
          done

      - name: Canary — backend health
        run: |
          for attempt in $(seq 1 15); do
            if curl --fail --silent --show-error --connect-timeout 10 --max-time 20 https://pronokif.eu/api/health >/tmp/pronokif-health.json; then
              STATUS=$(python3 -c "import json,sys; d=json.load(open('/tmp/pronokif-health.json')); print(d.get('status','unknown'))")
              echo "::notice::Backend healthy: $STATUS"
              break
            fi
            echo "Health check attempt $attempt/15 failed, retrying..."
            sleep 10
          done
          cat /tmp/pronokif-health.json || true

      - name: Canary — critical API endpoints
        run: |
          FAIL=0
          # Retry each endpoint: a deploy restarts the backend, so the first hit
          # during warm-up can transiently 5xx or hang while the Mongo connection
          # re-establishes (motor serverSelectionTimeoutMS=30s). Pass on the first
          # expected code; only a sustained failure fails the deploy — the same
          # resilience the backend-health step already has. curl stays bounded by
          # --connect-timeout/--max-time so no single attempt can hang.
          check() {
            url="$1"; want="$2"; code="000"
            for attempt in $(seq 1 6); do
              code=$(curl -sf -o /dev/null --connect-timeout 10 --max-time 20 -w "%{http_code}" "$url" 2>/dev/null || echo "000")
              if [ "$code" = "$want" ]; then
                echo "  ✅ $url → $code (attempt $attempt)"
                return
              fi
              echo "  … $url → $code (attempt $attempt/6, want $want), retrying in 10s"
              sleep 10
            done
            echo "  ❌ $url → $code (expected $want after 6 attempts)"
            FAIL=1
          }
          echo "Checking critical endpoints..."
          check "https://pronokif.eu/"                     "200"
          check "https://pronokif.eu/api/health"           "200"
          check "https://pronokif.eu/api/drivers"          "200"
          check "https://pronokif.eu/api/races/upcoming"   "200"
          check "https://pronokif.eu/api/auth/session"     "200"
          [ $FAIL -eq 0 ] || { echo "::error::Canary checks failed"; exit 1; }

  notify:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **StormDeploy:** ${{ needs.deploy.result }}" >> "$GITHUB_STEP_SUMMARY"
