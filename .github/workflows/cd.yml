# Pronokif CD — trigger StormDeploy on push to main.
#
# Required GitHub secret:
#   STORMDEPLOY_WEBHOOK_SECRET — HMAC secret configured on the StormDeploy app
#
# Optional GitHub variable:
#   STORMDEPLOY_WEBHOOK_URL — defaults to the production Pronokif StormDeploy webhook

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-check:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for backend CI gate
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Backend (lint + test)"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Wait for frontend CI gate
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Frontend (lint + typecheck + test + build)"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Wait for Docker build gate
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Docker build check"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  deploy:
    name: Trigger StormDeploy
    runs-on: ubuntu-latest
    needs: [ci-check]

    steps:
      - uses: actions/checkout@v4

      - name: Trigger signed StormDeploy webhook
        env:
          STORMDEPLOY_WEBHOOK_URL: ${{ vars.STORMDEPLOY_WEBHOOK_URL || 'https://beta.stormeo.io/api/storm-deploy/webhook/pronokif' }}
          STORMDEPLOY_WEBHOOK_SECRET: ${{ secrets.STORMDEPLOY_WEBHOOK_SECRET }}
        run: |
          if [ -z "$STORMDEPLOY_WEBHOOK_SECRET" ]; then
            echo "::error::Missing STORMDEPLOY_WEBHOOK_SECRET. Configure the GitHub secret with the value stored on the StormDeploy app."
            exit 1
          fi

          commit_message="$(git log -1 --pretty=%s)"
          payload="$(jq -nc \
            --arg ref "$GITHUB_REF" \
            --arg after "$GITHUB_SHA" \
            --arg message "$commit_message" \
            '{ref: $ref, after: $after, head_commit: {message: $message}}')"

          signature="$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$STORMDEPLOY_WEBHOOK_SECRET" | awk '{print $2}')"

          curl --fail-with-body --show-error --silent \
            -X POST "$STORMDEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$signature" \
            --data "$payload"

      - name: Canary health check
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error https://pronokif.stormeo.io/api/health >/tmp/pronokif-health.json; then
              cat /tmp/pronokif-health.json
              exit 0
            fi
            echo "Waiting for Pronokif health check ($attempt/30)..."
            sleep 10
          done
          echo "::error::Pronokif health check did not recover after deploy trigger."
          exit 1

  notify:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **StormDeploy:** ${{ needs.deploy.result }}" >> "$GITHUB_STEP_SUMMARY"
