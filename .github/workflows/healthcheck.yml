# Pronokif — External monitoring / healthcheck.
#
# Runs every 30 minutes and checks that:
#   1. The prod frontend is reachable and returns 200
#   2. The backend /api/health returns {"status":"healthy"}
#   3. Critical API endpoints respond correctly
#
# On failure, the workflow run turns red in GitHub Actions, giving a
# simple external monitoring view without a third-party service.
# Pair with GitHub Actions "failed" email notifications to get alerts.

name: Healthcheck (monitoring)

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  healthcheck:
    name: Pronokif prod health
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Frontend reachable
        run: |
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" https://pronokif.eu/ 2>/dev/null || echo "000")
          echo "GET / → $CODE"
          [ "$CODE" = "200" ] || { echo "::error::Frontend unreachable (HTTP $CODE)"; exit 1; }

      - name: Backend healthy
        run: |
          BODY=$(curl -sf https://pronokif.eu/api/health 2>/dev/null || echo '{}')
          STATUS=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
          echo "Backend status: $STATUS"
          [ "$STATUS" = "healthy" ] || { echo "::error::Backend unhealthy: $BODY"; exit 1; }

      - name: Critical API endpoints
        run: |
          FAIL=0
          check() {
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$1" 2>/dev/null || echo "000")
            if [ "$CODE" = "$2" ]; then
              echo "  ✅ $1 → $CODE"
            else
              echo "  ❌ $1 → $CODE (expected $2)"
              FAIL=1
            fi
          }
          check "https://pronokif.eu/api/drivers"          "200"
          check "https://pronokif.eu/api/races/upcoming"   "200"
          check "https://pronokif.eu/api/auth/session"     "200"
          [ $FAIL -eq 0 ] || { echo "::error::One or more critical endpoints failed"; exit 1; }

      - name: Summary
        if: always()
        run: |
          echo "## Healthcheck $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "Prod: https://pronokif.eu" >> "$GITHUB_STEP_SUMMARY"
