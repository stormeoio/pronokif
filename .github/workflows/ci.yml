# Pronokif CI — runs on every PR and push to main.
# Jobs: lint + typecheck + test (backend & frontend) + build.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────── Backend ───────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.runCommand(\"ping\").ok' --quiet"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports || true  # non-blocking for now

      - name: Tests
        env:
          PYTHONPATH: .
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: pronokif_test
          JWT_SECRET: test-secret-minimum-32-characters-long!
        # Keep CI on tests that do not require a live, seeded API server.
        # The request-based tests in tests/ are integration tests and need a
        # dedicated uvicorn + seed-data harness before they can gate deploys.
        run: >
          pytest
          tests/test_auth_magic_link.py
          tests/test_config.py
          tests/test_email_service.py
          tests/test_scoring.py
          tests/test_server_lifespan.py
          tests/test_sync_helpers.py
          -v
          --tb=short

  # ─────────────────────────── Frontend ──────────────────────────
  frontend:
    name: Frontend (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Tests (Vitest + coverage)
        run: npx vitest run --coverage --coverage.reporter=text --coverage.thresholds.statements=20

      - name: Build
        env:
          VITE_BACKEND_URL: https://api.pronokif.com
        run: npm run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  # ─────────────────────────── E2E (Playwright) ──────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]
    # Blocking gate: a red E2E run fails CI and blocks the CD deploy (see the
    # "Wait for E2E gate" step in cd.yml). The suite is mocked (chromium only);
    # CI retries twice (playwright.config.ts) to absorb browser-timing flake.
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (chromium only)
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 1

  # ─────────────────────────── Docker ────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t pronokif-backend ./backend

      - name: Build frontend image
        run: docker build -t pronokif-frontend ./frontend --build-arg VITE_BACKEND_URL=https://api.pronokif.com
