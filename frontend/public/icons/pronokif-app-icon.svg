<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">PronoKif app icon</title>
  <desc id="desc">Square dark racing icon with a metallic PK monogram and red speed accent.</desc>
  <defs>
    <linearGradient id="plate" x1="84" y1="40" x2="430" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#282d36"/>
      <stop offset="0.45" stop-color="#07090e"/>
      <stop offset="1" stop-color="#171a20"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="118" x2="0" y2="362" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.38" stop-color="#e7eaed"/>
      <stop offset="0.68" stop-color="#858d96"/>
      <stop offset="1" stop-color="#f4f4f4"/>
    </linearGradient>
    <linearGradient id="red" x1="260" y1="120" x2="390" y2="374" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff3b36"/>
      <stop offset="0.48" stop-color="#e10600"/>
      <stop offset="1" stop-color="#7d0000"/>
    </linearGradient>
    <filter id="depth" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="15" flood-color="#000000" flood-opacity="0.68"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#e10600" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#plate)"/>
  <path d="M0 354 C126 292 268 424 512 322 L512 512 L0 512 Z" fill="#e10600" opacity="0.2"/>
  <path d="M70 96 H442" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
  <path d="M70 418 H442" stroke="#e10600" stroke-opacity="0.3" stroke-width="2"/>

  <g filter="url(#depth)" transform="skewX(-10)">
    <text
      x="232"
      y="326"
      text-anchor="middle"
      font-family="Arial Black, Impact, sans-serif"
      font-size="218"
      font-weight="900"
      letter-spacing="-34"
      fill="url(#silver)"
      stroke="#5e6670"
      stroke-width="4"
      paint-order="stroke fill"
    >P</text>
    <text
      x="326"
      y="326"
      text-anchor="middle"
      font-family="Arial Black, Impact, sans-serif"
      font-size="218"
      font-weight="900"
      letter-spacing="-28"
      fill="url(#red)"
      stroke="#520000"
      stroke-width="4"
      paint-order="stroke fill"
    >K</text>
  </g>

  <path d="M94 388 C184 348 302 406 424 346" fill="none" stroke="#ffffff" stroke-opacity="0.36" stroke-width="9" stroke-linecap="round"/>
  <path d="M100 410 C210 366 318 420 428 368" fill="none" stroke="#e10600" stroke-opacity="0.82" stroke-width="7" stroke-linecap="round"/>
  <path d="M396 150 L338 250 H388 L334 362 L452 214 H396 Z" fill="#e10600" opacity="0.35"/>
</svg>
