<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0B0D12" />
    <title>PronoKif — Hors ligne</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 50% -10%, rgba(225, 6, 0, 0.18), transparent 34%),
          linear-gradient(180deg, #0b0d12 0%, #07090d 58%, #0b0d12 100%);
        color: #f4f4f4;
        padding: 24px;
      }
      .panel {
        width: min(420px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(18, 20, 24, 0.9);
        padding: 28px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.48);
        text-align: center;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 18px;
        border: 1px solid rgba(225, 6, 0, 0.28);
        border-radius: 4px;
        padding: 7px 10px;
        color: #ff5a52;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #e10600;
        box-shadow: 0 0 16px rgba(225, 6, 0, 0.5);
      }
      h1 {
        margin-bottom: 10px;
        font-size: 26px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
      p {
        color: #a1a1aa;
        font-size: 14px;
        line-height: 1.6;
      }
      .actions {
        display: grid;
        gap: 10px;
        margin-top: 24px;
      }
      a,
      button {
        width: 100%;
        min-height: 44px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: #f4f4f4;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
      }
      button.primary {
        border-color: rgba(225, 6, 0, 0.45);
        background: rgba(225, 6, 0, 0.16);
        color: #fff;
      }
      .stripe {
        height: 3px;
        margin-top: 26px;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, #e10600, #fff, #e10600, transparent);
        opacity: 0.65;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="status"><span class="dot"></span>Connexion perdue</div>
      <h1>Hors ligne</h1>
      <p>
        Le paddock est momentanément inaccessible. Les pages déjà chargées peuvent rester disponibles,
        mais les pronostics, classements et actions admin nécessitent une connexion.
      </p>
      <div class="actions">
        <button class="primary" onclick="window.location.reload()">Réessayer</button>
        <a href="/admin">Ouvrir le back-office</a>
        <a href="/mentions-legales">Mentions légales</a>
      </div>
      <div class="stripe"></div>
    </main>
  </body>
</html>
