<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f97316" />
  <title>Pronokif — Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #0a0f1a 0%, #151c2c 50%, #0a0f1a 100%);
      color: #fff;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 380px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: rgba(251, 191, 36, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }
    .icon svg {
      width: 40px;
      height: 40px;
      color: #fbbf24;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    p {
      font-size: 0.875rem;
      color: #9ca3af;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      border: 2px solid rgba(255, 102, 0, 0.4);
      background: rgba(255, 102, 0, 0.1);
      color: #ff6600;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn:hover {
      background: rgba(255, 102, 0, 0.2);
      border-color: #ff6600;
      transform: translateY(-2px);
    }
    .btn:active {
      transform: scale(0.95);
    }
    .kerb {
      width: 100%;
      height: 3px;
      margin: 32px 0;
      background: linear-gradient(90deg, #dc2626, #fff, #dc2626);
      opacity: 0.5;
      border-radius: 2px;
    }
    .status {
      font-size: 0.75rem;
      color: #6b7280;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M12 12v.01M8.464 15.536a5 5 0 010-7.072M15.536 8.464a5 5 0 010 7.072" />
      </svg>
    </div>
    <h1>Hors connexion</h1>
    <p>Tu n'as pas de connexion internet pour le moment. Reconnecte-toi pour retrouver tes pronostics et le classement.</p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      Reessayer
    </a>
    <div class="kerb"></div>
    <p class="status">Pronokif fonctionne mieux avec une connexion internet</p>
  </div>
</body>
</html>
